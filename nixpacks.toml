# Railway Nixpacks — Lojman Laravel
# https://docs.railway.com/guides/laravel
# Yalnızca PHP — arayüz CDN ile yüklendiği için npm/vite build gerekmez.

providers = ["php"]

[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "php82Extensions.pdo_pgsql", "php82Extensions.mbstring", "php82Extensions.gd", "php82Extensions.zip", "php82Extensions.bcmath"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[phases.build]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
]

[start]
cmd = "sh scripts/railway-start.sh"
